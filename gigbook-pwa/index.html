<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- PWA -->
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GigBook" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- iOS icons (generados desde icon-512.png) -->
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192.png" />

  <!-- Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <title>GigBook</title>

  <style>
    /* Pantalla de carga mientras React hidrata */
    html, body { margin: 0; padding: 0; background: #0a0a0a; height: 100%; }
    #root { height: 100%; }
    #splash {
      position: fixed; inset: 0; background: #0a0a0a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      z-index: 9999; transition: opacity 0.3s;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    #splash-logo {
      font-family: 'Courier New', monospace; font-size: 28px;
      font-weight: 700; color: #e8ff3a; letter-spacing: -0.02em;
    }
    #splash-sub {
      font-family: sans-serif; font-size: 11px; font-weight: 600;
      letter-spacing: 0.15em; text-transform: uppercase; color: #444;
    }

    /* Banner de actualización disponible */
    #update-banner {
      display: none; position: fixed; bottom: 0; left: 0; right: 0;
      background: #1a1a1a; border-top: 1px solid #2a2a2a;
      padding: 14px 16px; z-index: 500;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
    }
    #update-banner.visible { display: flex; }
    #update-text {
      font-family: sans-serif; font-size: 13px; color: #aaa; flex: 1;
    }
    #update-btn {
      background: #e8ff3a; color: #000; border: none;
      padding: 8px 16px; border-radius: 6px;
      font-family: sans-serif; font-size: 12px; font-weight: 700;
      cursor: pointer; white-space: nowrap;
    }
    #update-dismiss {
      background: none; border: none; color: #444;
      font-size: 18px; cursor: pointer; padding: 4px;
    }
  </style>
</head>
<body>

  <!-- Splash screen -->
  <div id="splash">
      <div id="splash-logo">GigBook</div>
      <div id="splash-sub">Cargando v0.2…</div>
  </div>

  <!-- Banner de actualización -->
  <div id="update-banner">
    <span id="update-text">Nueva versión disponible</span>
    <button id="update-btn">Actualizar</button>
    <button id="update-dismiss">✕</button>
  </div>

  <!-- React mount point -->
  <div id="root"></div>

  <!-- Vite / build entry -->
  <script type="module" src="/src/main.jsx?v=0.2"></script>

  <!-- Service Worker registration -->
  <script>
    // ── Ocultar splash cuando React monta ──
    window.__gigbookReady = function () {
      const splash = document.getElementById('splash');
      if (splash) {
        splash.classList.add('hide');
        setTimeout(() => splash.remove(), 400);
      }
    };

    // ── Service Worker ──
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const reg = await navigator.serviceWorker.register('/service-worker.js');

          // Detectar nueva versión esperando activación
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            if (!newWorker) return;

            newWorker.addEventListener('statechange', () => {
              // Hay una nueva versión lista pero esperando
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                showUpdateBanner(newWorker);
              }
            });
          });

          // Si hay un SW esperando al cargar la página (recarga tras update)
          if (reg.waiting) {
            showUpdateBanner(reg.waiting);
          }

        } catch (err) {
          console.warn('[GigBook SW] Error al registrar:', err);
        }
      });

      // Recargar cuando el nuevo SW tome control
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) { refreshing = true; window.location.reload(); }
      });
    }

    function showUpdateBanner(worker) {
      const banner  = document.getElementById('update-banner');
      const btn     = document.getElementById('update-btn');
      const dismiss = document.getElementById('update-dismiss');

      banner.classList.add('visible');

      btn.addEventListener('click', () => {
        worker.postMessage({ type: 'SKIP_WAITING' });
        banner.classList.remove('visible');
      });

      dismiss.addEventListener('click', () => {
        banner.classList.remove('visible');
      });
    }
  </script>
</body>
</html>
